name: flutter_base_architecture
description: "StartAPP - Pocker Watcher"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.4

  flutter_bloc: ^9.1.1
  freezed: ^3.2.5

  smooth_page_indicator: ^2.0.1

  dio: ^5.9.2

  go_router: ^17.2.2




dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  build_runner: ^2.12.0
  flutter_gen_runner: ^5.14.0

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins-thin.ttf
          weight: 100
        - asset: assets/fonts/poppins-extra_light.ttf
          weight: 200
        - asset: assets/fonts/poppins-light.ttf
          weight: 300
        - asset: assets/fonts/poppins-regular.ttf
          weight: 400
        - asset: assets/fonts/poppins-medium.ttf
          weight: 500
        - asset: assets/fonts/poppins-semi_bold.ttf
          weight: 600
        - asset: assets/fonts/poppins-bold.ttf
          weight: 700
        - asset: assets/fonts/poppins-extra_bold.ttf
          weight: 800
        - asset: assets/fonts/poppins-black.ttf
          weight: 900

flutter_gen:
  output: lib/gen/
  line_length: 80
